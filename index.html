<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasaany Store - المتجر الاحترافي</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; width: 80%; max-width: 400px; }
        img { width: 120px; height: 120px; border-radius: 20px; margin-bottom: 20px; border: 3px solid #3b82f6; }
        .btn { display: block; background: #3b82f6; color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #2563eb; }
        .channel { color: #94a3b8; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://a.top4top.io/p_38337brtb0.jpeg" alt="Logo">
        <h2>Hasaany Store</h2>
        <p>التطبيق الموثوق للتحميل المباشر</p>
        
        <a href="https://github.com/husszzzz/HasaanyPROMAX/raw/refs/heads/main/hassanyIPA_1.0_1782848953.ipa" 
           class="btn" onclick="openChannel()">تثبيت التطبيق الآن</a>
        
        <div class="channel">قناة التليجرام: @hasaanyIPA</div>
    </div>

    <script>
        function openChannel() {
            // يبدأ التحميل تلقائياً
            // ثم يفتح القناة في تبويب جديد بعد ثانية
            setTimeout(function() {
                window.open('https://t.me/hasaanyIPA', '_blank');
            }, 1000);
        }
    </script>
</body>
</html>
